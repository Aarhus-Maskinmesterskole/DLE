name: Deploy Slides
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      # Nu går vi direkte ind i den nye 'slidev' mappe
      - name: Install and Build
        run: |
          cd "slidev"
          npm install
          npm run build -- --base /DLE/
      
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Her fortæller vi den, hvor den nye 'dist' mappe ligger
          publish_dir: ./slidev/dist